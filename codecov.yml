codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 80%
        informational: true

flags:
  unit-tests:
    paths:
      - "!vendor/"
    carryforward: true

comment:
  layout: "reach,diff,flags,files,footer"
  require_changes: true
